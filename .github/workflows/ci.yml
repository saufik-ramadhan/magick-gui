# CI — runs on every PR and push to master
# Required checks: lint (tsc --noEmit) + build (electron-vite build)
# These checks must pass before merging into master
#
# Why ubuntu-latest: lint and build are platform-agnostic.
# Ubuntu runners are faster and cheaper than Windows.

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type-check (tsc --noEmit)
        run: npm run lint

      - name: Build (electron-vite)
        run: npm run build

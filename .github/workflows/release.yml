# Release — triggered by pushing a version tag (e.g. v1.2.0)
#
# Workflow:
#   1. Developer runs `npm run release:patch` (or :minor/:major)
#      → bumps version in package.json + docs, commits, tags, pushes
#   2. This workflow picks up the tag and:
#      a. Builds the app (electron-vite)
#      b. Packages the NSIS installer (electron-builder)
#      c. Creates a GitHub Release with the installer artifact
#
# Docs version is updated BEFORE the tag is pushed (by the npm version hook),
# so the tag already includes the correct docs.

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build app
        run: npm run build

      - name: Package NSIS installer
        run: npx electron-builder --win --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $ver = node -p "require('./package.json').version"
          echo "version=$ver" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: MagickGUI v${{ steps.version.outputs.version }}
          body: |
            ## MagickGUI v${{ steps.version.outputs.version }}

            See the [commit log](https://github.com/${{ github.repository }}/commits/v${{ steps.version.outputs.version }}) for details.
          files: dist/MagickGUI-*-Setup.exe
          generate_release_notes: true
